syntax = "proto3";

package stats.message;

option java_package = "ru.yandex.practicum.grpc.stats.dashboard";
option java_outer_classname = "RecommendationsProto";
option java_multiple_files = true;

message UserPredictionsRequestProto {
  int64 user_id = 1;
  int32 max_results = 2;
}

message SimilarEventsRequestProto {
  int64 event_id = 1;
  int64 user_id = 2;
  int32 max_results = 3;
}

message InteractionsCountRequestProto {
  repeated int64 event_id = 1;
}

message RecommendedEventProto {
  int64 event_id = 1;
  double score = 2;
}

message UserInteractionCheckRequest {
  int64 user_id = 1;
  int64 event_id = 2;
}

message UserInteractionCheckResponse {
  bool has_interaction = 1;
}