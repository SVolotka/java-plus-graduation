server.port=0
spring.application.name=config-server
spring.profiles.active=native

spring.cloud.config.server.native.search-locations[0]=classpath:config/core/main-service/{application}
spring.cloud.config.server.native.search-locations[1]=classpath:config/core/user-service/{application}
spring.cloud.config.server.native.search-locations[2]=classpath:config/stats-service/{application}
spring.cloud.config.server.native.search-locations[3]=classpath:config/infra/{application}

eureka.client.serviceUrl.defaultZone=http://${eureka.instance.hostname:localhost}:${eureka.instance.port:8761}/eureka/
eureka.client.registerWithEureka=true
eureka.client.fetchRegistry=false