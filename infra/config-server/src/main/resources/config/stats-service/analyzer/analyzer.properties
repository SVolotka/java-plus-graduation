spring.application.name=analyzer
grpc.server.port=0
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://analyzer-db:5432/analyzer}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:analyzer}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:analyzer}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.client.health-check.enabled=true
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true