spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

logging.level.ru.practicum.explorewithme=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.cloud.openfeign.circuitbreaker.enabled=true
feign.client.config.default.retryer=feign.Retryer.Default
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=10000

resilience4j.retry.instances.default.max-attempts=3
resilience4j.retry.instances.default.wait-duration=1s
resilience4j.retry.instances.default.retry-exceptions[0]=feign.FeignException$ServiceUnavailable
resilience4j.retry.instances.default.retry-exceptions[1]=feign.FeignException$GatewayTimeout
resilience4j.retry.instances.default.retry-exceptions[2]=java.net.ConnectException

resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=10s

grpc.client.collector.address=discovery:///collector
grpc.client.collector.negotiationType=plaintext
grpc.client.collector.enableKeepAlive=true
grpc.client.collector.keepAliveWithoutCalls=true

grpc.client.analyzer.address=discovery:///analyzer
grpc.client.analyzer.negotiationType=plaintext
grpc.client.analyzer.enableKeepAlive=true
grpc.client.analyzer.keepAliveWithoutCalls=true

eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka/}