spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=user-service-route
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/admin/users/**

spring.cloud.gateway.routes[1].id=request-service-events-route
spring.cloud.gateway.routes[1].uri=lb://REQUEST-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/*/events/*/requests/**

spring.cloud.gateway.routes[2].id=request-service-route
spring.cloud.gateway.routes[2].uri=lb://REQUEST-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/users/*/requests/**

spring.cloud.gateway.routes[3].id=comment-service-admin-route
spring.cloud.gateway.routes[3].uri=lb://COMMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/admin/comments/**

spring.cloud.gateway.routes[4].id=comment-service-events-comments-route
spring.cloud.gateway.routes[4].uri=lb://COMMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/events/*/comments/**

spring.cloud.gateway.routes[5].id=comment-service-private-route
spring.cloud.gateway.routes[5].uri=lb://COMMENT-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/events/*/users/*/comment/**

spring.cloud.gateway.routes[6].id=comment-service-reactions-route
spring.cloud.gateway.routes[6].uri=lb://COMMENT-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/comments/**

spring.cloud.gateway.routes[7].id=event-service-route
spring.cloud.gateway.routes[7].uri=lb://EVENT-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/events/**,/categories/**,/admin/categories/**,/compilations/**,/admin/compilations/**,/admin/events/**,/users/*/events/**